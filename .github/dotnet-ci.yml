name: Publish .NET app to Ubuntu self-hosted runner

on:
  push:
    branches: 
      - "master"
      - "develop"
  pull_request:
    branches:
      - "master"
      - "develop"

jobs:
  restore:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Restore dependencies
        run: dotnet restore
    
  build:
    runs-on: self-hosted
    needs: restore
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build application
        run: dotnet build --configuration Release
  
  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run tests
        run: dotnet test

  publish:
    runs-on: self-hosted
    needs:
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Publish application
        run: dotnet publish -c Release --runtime linux-x64 --self-contained true --output ./publish/release-$GITHUB_RUN_NUMBER
  
